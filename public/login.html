<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — MIK AI Platform</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background:
        radial-gradient(1200px 700px at 15% 85%, rgba(0,90,55,.9), transparent 58%),
        radial-gradient(900px 600px at 85% 15%, rgba(0,70,45,.7), transparent 55%),
        radial-gradient(700px 500px at 50% 50%, rgba(0,50,35,.4), transparent 65%),
        linear-gradient(160deg, #021510 0%, #031a12 40%, #042018 70%, #021408 100%);
      color: rgba(255,255,255,.92);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      line-height: 1.45;
    }
    .card {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
      backdrop-filter: blur(14px);
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      pointer-events: none;
      position: absolute;
      inset: -40px;
      opacity: .14;
      background-image:
        linear-gradient(rgba(255,255,255,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.06) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(closest-side at 50% 25%, rgba(0,0,0,.9), transparent 70%);
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
      position: relative;
    }
    .logo-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, rgba(0,160,90,.95), rgba(0,230,130,.85));
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 12px;
      box-shadow: 0 8px 24px rgba(0,180,100,.3);
    }
    .logo h1 { color: rgba(255,255,255,.95); font-size: 20px; font-weight: 700; }
    .logo p  { color: rgba(255,255,255,.55); font-size: 13px; margin-top: 4px; }

    .field { margin-bottom: 14px; position: relative; }
    label {
      display: block;
      color: rgba(255,255,255,.62);
      font-size: 13px;
      margin-bottom: 6px;
    }
    label .req { color: rgba(255,80,80,.9); }
    input {
      width: 100%;
      padding: 11px 16px;
      background: rgba(0,0,0,.28);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 10px;
      color: rgba(255,255,255,.92);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input:focus {
      border-color: rgba(0,200,110,.5);
      box-shadow: 0 0 0 3px rgba(0,200,110,.13);
    }
    input::placeholder { color: rgba(255,255,255,.25); }

    .btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, rgba(0,160,90,.95), rgba(0,230,130,.82));
      border: 1px solid rgba(0,220,110,.28);
      border-radius: 10px;
      color: rgba(255,255,255,.97);
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity .18s, transform .15s ease, box-shadow .15s ease;
      box-shadow: 0 4px 20px rgba(0,180,100,.22);
    }
    .btn:hover {
      opacity: .92;
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(0,180,100,.32);
    }
    .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    .btn-outline {
      width: 100%;
      padding: 13px;
      background: rgba(0,180,100,.1);
      border: 1px solid rgba(0,200,100,.3);
      border-radius: 10px;
      color: rgba(160,255,200,.85);
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 10px;
      transition: background .18s, border-color .18s, transform .15s ease;
    }
    .btn-outline:hover {
      background: rgba(0,180,100,.18);
      border-color: rgba(0,220,110,.52);
      transform: translateY(-1px);
    }

    .msg {
      border-radius: 10px;
      font-size: 13px;
      padding: 10px 14px;
      margin-bottom: 16px;
      display: none;
    }
    .msg.show { display: block; }
    .msg.error {
      background: rgba(255,60,60,.08);
      border: 1px solid rgba(255,60,60,.22);
      color: rgba(255,160,160,.9);
    }
    .msg.success {
      background: rgba(0,200,110,.08);
      border: 1px solid rgba(0,200,110,.22);
      color: rgba(100,230,160,.9);
    }

    .back-link {
      text-align: center;
      margin-top: 18px;
      color: rgba(255,255,255,.48);
      font-size: 13px;
    }
    .back-link a { color: rgba(100,220,160,.85); text-decoration: none; cursor: pointer; }
    .back-link a:hover { text-decoration: underline; }

    .section { display: none; }
    .section.active { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon"><img src="/logo_login.svg" alt="MIK" style="width:36px;height:36px;object-fit:contain;"></div>
      <h1>MIK AI Platform</h1>
      <p id="subtitle">Войдите в свой аккаунт</p>
    </div>

    <!-- Форма входа -->
    <div class="section active" id="loginSection">
      <div class="msg error" id="loginErr"></div>

      <div class="field">
        <label>Логин</label>
        <input type="text" id="login" placeholder="Введите логин" autocomplete="username">
      </div>
      <div class="field">
        <label>Пароль</label>
        <input type="password" id="password" placeholder="Введите пароль" autocomplete="current-password">
      </div>

      <button class="btn" id="loginBtn" onclick="doLogin()">Войти</button>
      <button class="btn-outline" onclick="showSection('register')">Создать аккаунт</button>
    </div>

    <!-- Форма регистрации -->
    <div class="section" id="registerSection">
      <div class="msg error"   id="regErr"></div>
      <div class="msg success" id="regOk"></div>

      <div class="field">
        <label>Фамилия <span class="req">*</span></label>
        <input type="text" id="reg_last_name" placeholder="Иванов">
      </div>
      <div class="field">
        <label>Имя <span class="req">*</span></label>
        <input type="text" id="reg_first_name" placeholder="Иван">
      </div>
      <div class="field">
        <label>Отчество</label>
        <input type="text" id="reg_patronymic" placeholder="Иванович">
      </div>
      <div class="field">
        <label>Рабочая почта <span class="req">*</span></label>
        <input type="email" id="reg_email" placeholder="ivanov@company.ru">
      </div>
      <div class="field">
        <label>Пароль <span class="req">*</span></label>
        <input type="password" id="reg_password" placeholder="Минимум 6 символов">
      </div>
      <div class="field">
        <label>Повторите пароль <span class="req">*</span></label>
        <input type="password" id="reg_password2" placeholder="Повторите пароль">
      </div>

      <button class="btn" id="regBtn" onclick="doRegister()">Создать аккаунт</button>
      <div class="back-link">
        Уже есть аккаунт? <a onclick="showSection('login')">Войти</a>
      </div>
    </div>
  </div>

  <script>
    const subtitles = { login: 'Войдите в свой аккаунт', register: 'Создайте аккаунт' };

    function showSection(name) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById(name + 'Section').classList.add('active');
      document.getElementById('subtitle').textContent = subtitles[name];
    }

    document.getElementById('password').addEventListener('keydown',    e => { if (e.key === 'Enter') doLogin(); });
    document.getElementById('reg_password2').addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });

    function saveAuth(data) {
      localStorage.setItem('auth_token', data.token);
      localStorage.setItem('auth_role',  data.role);
      localStorage.setItem('auth_login', data.login);
      const mikAuth = {
        isAuthorized: true, token: data.token, role: data.role, login: data.login,
        full_name: data.full_name || null, department: data.department || null, contacts: data.contacts || null
      };
      localStorage.setItem('mikAuth', JSON.stringify(mikAuth));
      if (data.full_name) localStorage.setItem('auth_full_name', data.full_name);

      // Save profile for dashboard name resolution
      try {
        const profiles = JSON.parse(localStorage.getItem('user_profiles') || '{}');
        profiles[data.login] = {
          name: data.full_name || data.login,
          department: data.department || ''
        };
        localStorage.setItem('user_profiles', JSON.stringify(profiles));
      } catch(_) {}
    }

    async function doLogin() {
      const login    = document.getElementById('login').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('loginErr');

      err.classList.remove('show');
      if (!login || !password) { err.textContent = 'Введите логин и пароль'; err.classList.add('show'); return; }

      btn.disabled = true; btn.textContent = 'Вход...';
      try {
        const res  = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ login, password }) });
        const data = await res.json();
        if (!res.ok) { err.textContent = data.error || 'Ошибка входа'; err.classList.add('show'); btn.disabled = false; btn.textContent = 'Войти'; return; }
        saveAuth(data);
        window.location = data.role === 'admin' ? '/admin' : '/profile';
      } catch {
        err.textContent = 'Ошибка сервера'; err.classList.add('show'); btn.disabled = false; btn.textContent = 'Войти';
      }
    }

    async function doRegister() {
      const last_name  = document.getElementById('reg_last_name').value.trim();
      const first_name = document.getElementById('reg_first_name').value.trim();
      const patronymic = document.getElementById('reg_patronymic').value.trim();
      const email      = document.getElementById('reg_email').value.trim();
      const password   = document.getElementById('reg_password').value;
      const password2  = document.getElementById('reg_password2').value;
      const btn = document.getElementById('regBtn');
      const err = document.getElementById('regErr');
      const ok  = document.getElementById('regOk');

      err.classList.remove('show'); ok.classList.remove('show');

      if (!last_name || !first_name || !email || !password) {
        err.textContent = 'Заполните все обязательные поля'; err.classList.add('show'); return;
      }
      if (password !== password2) {
        err.textContent = 'Пароли не совпадают'; err.classList.add('show'); return;
      }
      if (password.length < 6) {
        err.textContent = 'Пароль должен содержать не менее 6 символов'; err.classList.add('show'); return;
      }

      btn.disabled = true; btn.textContent = 'Регистрация...';
      try {
        const res  = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ last_name, first_name, patronymic, email, password, password_confirm: password2 })
        });
        const data = await res.json();
        if (!res.ok) { err.textContent = data.error || 'Ошибка регистрации'; err.classList.add('show'); btn.disabled = false; btn.textContent = 'Создать аккаунт'; return; }
        saveAuth(data);
        window.location = '/profile';
      } catch {
        err.textContent = 'Ошибка сервера'; err.classList.add('show'); btn.disabled = false; btn.textContent = 'Создать аккаунт';
      }
    }
  </script>
</body>
</html>
