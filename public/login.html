<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — MIK AI Platform</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 12px;
    }
    .logo h1 {
      color: #fff;
      font-size: 20px;
      font-weight: 600;
    }
    .logo p {
      color: #6b7280;
      font-size: 13px;
      margin-top: 4px;
    }
    .field {
      margin-bottom: 16px;
    }
    label {
      display: block;
      color: #9ca3af;
      font-size: 13px;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      background: #0f1117;
      border: 1px solid #2a2d3a;
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #6366f1; }
    input::placeholder { color: #4b5563; }
    .btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error {
      background: #2d1b1b;
      border: 1px solid #7f1d1d;
      border-radius: 8px;
      color: #fca5a5;
      font-size: 13px;
      padding: 10px 14px;
      margin-bottom: 16px;
      display: none;
    }
    .error.show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🤖</div>
      <h1>MIK AI Platform</h1>
      <p>Войдите в свой аккаунт</p>
    </div>

    <div class="error" id="errorMsg"></div>

    <div class="field">
      <label>Логин</label>
      <input type="text" id="login" placeholder="Введите логин" autocomplete="username">
    </div>
    <div class="field">
      <label>Пароль</label>
      <input type="password" id="password" placeholder="Введите пароль" autocomplete="current-password">
    </div>
    <button class="btn" id="loginBtn" onclick="doLogin()">Войти</button>
  </div>

  <script>
    // Форма входа

    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
      const login = document.getElementById('login').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errorMsg');

      err.classList.remove('show');
      if (!login || !password) {
        err.textContent = 'Введите логин и пароль';
        err.classList.add('show');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Вход...';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ login, password })
        });
        const data = await res.json();

        if (!res.ok) {
          err.textContent = data.error || 'Ошибка входа';
          err.classList.add('show');
          btn.disabled = false;
          btn.textContent = 'Войти';
          return;
        }

        localStorage.setItem('auth_token', data.token);
        localStorage.setItem('auth_role', data.role);
        localStorage.setItem('auth_login', data.login);
        if (data.full_name) localStorage.setItem('auth_full_name', data.full_name);
        localStorage.setItem('mikAuth', JSON.stringify({
          isAuthorized: true,
          token: data.token,
          role: data.role,
          login: data.login,
          full_name: data.full_name || null,
          department: data.department || null,
          contacts: data.contacts || null
        }));

        window.location = data.role === 'admin' ? '/admin' : '/profile';
      } catch (e) {
        err.textContent = 'Ошибка сервера';
        err.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Войти';
      }
    }
  </script>
</body>
</html>
