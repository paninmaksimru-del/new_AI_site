# Платформа внедрения ИИ инструментов — запуск в Docker
# Использование: docker compose up -d
# Открыть: http://localhost:19080 (нестандартный порт для инфраструктуры с ограничением портов)

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: mik_platform
      POSTGRES_USER: mik
      POSTGRES_PASSWORD: mik_pass
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mik -d mik_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  app:
    build: .
    ports:
      - "19080:19080"
    environment:
      - NODE_ENV=production
      - PORT=19080
      - DATABASE_URL=postgresql://mik:mik_pass@db:5432/mik_platform
    volumes:
      - uploads_data:/app/data/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:19080/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  pg_data:
  uploads_data:
